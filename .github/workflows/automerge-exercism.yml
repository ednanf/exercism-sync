name: Auto-merge Exercism Solutions

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    # Restrict execution solely to the official Exercism bot
    if: |
      github.event.pull_request.user.login == 'exercism-solutions-syncer[bot]' &&
      github.event.pull_request.user.type == 'Bot'
    
    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Approve the PR
        run: gh pr review --approve "$PR_URL"
        env:
          NOT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}

      - name: Merge the PR automatically
        run: gh pr merge --auto --squash "$PR_URL"
        env:
          NOT_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_URL: ${{ github.event.pull_request.html_url }}
